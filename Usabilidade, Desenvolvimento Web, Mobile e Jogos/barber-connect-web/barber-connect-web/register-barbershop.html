<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de barbearia | BarberConnect</title>
  <link rel="stylesheet" href="styles.css?v=20260612-agendamento-barbearia-definitivo">
</head>
<body class="site-page" data-page="register-barbershop" data-auth="protected">
  <header class="header">
  <a class="logo-ref" href="home.html" data-image-ref="assets/barberconnect-logo-text.png" aria-label="Ir para a página inicial do BarberConnect">
    <img class="logo-img" src="assets/barberconnect-logo-text.png" alt="Logo BarberConnect">
  </a>
  <nav class="header-actions" aria-label="Navegação principal">
    <a class="nav-button" href="home.html">Home</a>
    <a class="nav-button" href="appointments.html">Gerenciar agendamentos</a>
    <a class="nav-button" href="user.html">Perfil</a>
    <button class="nav-button nav-button-plain" type="button" id="logout-button">Sair</button>
  </nav>
</header>
  <main class="main form-main">
    <form class="form-card" id="register-barbershop-form" novalidate>
      <p class="form-note">Faça login com um usuário já confirmado para cadastrar uma barbearia.</p>
      <input class="input-field" type="text" name="name" placeholder="Nome da barbearia" required>
      <input class="input-field" type="text" name="cnpj" placeholder="CNPJ" required>
      <input class="input-field" type="tel" name="phone" placeholder="Telefone">
      <input class="input-field" type="text" name="address" placeholder="Endereço" required>
      <input class="input-field" type="text" name="businessHours" placeholder="Horário de funcionamento">
      <input class="input-field" type="url" name="photoUrl" placeholder="URL da foto/logo da barbearia">
      <input class="input-field" type="number" name="latitude" placeholder="Latitude" step="any" required>
      <input class="input-field" type="number" name="longitude" placeholder="Longitude" step="any" required>
      <p class="form-message" aria-live="polite"></p>
      <button class="btn submit-btn" type="submit">Concluir</button>
    </form>
  </main>
  <footer class="footer">
      <p class="footer-title">Entre em contato conosco</p>
      <ul class="social-list" aria-label="Redes sociais">
        <li><a href="#" aria-label="Facebook BarberConnect" data-image-ref="assets/social-facebook.svg"><img class="social-icon-img" src="assets/social-facebook.svg" alt="Facebook"><span>BarberConnect</span></a></li>
        <li><a href="#" aria-label="LinkedIn BarberConnect" data-image-ref="assets/social-linkedin.svg"><img class="social-icon-img" src="assets/social-linkedin.svg" alt="LinkedIn"><span>BarberConnect</span></a></li>
        <li><a href="#" aria-label="Instagram @BarberConnect" data-image-ref="assets/social-instagram.svg"><img class="social-icon-img" src="assets/social-instagram.svg" alt="Instagram"><span>@BarberConnect</span></a></li>
        <li><a href="#" aria-label="X antigo Twitter @BarberConnect" data-image-ref="assets/social-x.svg"><img class="social-icon-img" src="assets/social-x.svg" alt="X antigo Twitter"><span>@BarberConnect</span></a></li>
      </ul>
    </footer>
  <script src="js/config.js?v=20260612-agendamento-barbearia-definitivo"></script>
  <script src="js/api.js?v=20260612-agendamento-barbearia-definitivo"></script>
  <script src="js/pages.js?v=20260612-agendamento-barbearia-definitivo"></script>
</body>
</html>
